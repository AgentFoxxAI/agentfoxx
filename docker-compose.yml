# =============================================================================
# Telesign MCP Server - Docker Compose
# For local development and testing
# =============================================================================

services:
  telesign-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telesign-mcp-server
    env_file:
      - .env
    environment:
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=console
    restart: unless-stopped
    # For SSE transport (uncomment if using HTTP mode)
    # ports:
    #   - "8000:8000"
    # environment:
    #   - MCP_TRANSPORT=sse
