<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">

  <!-- Fox Mark — fluid leaping silhouette, side profile -->
  <g transform="translate(5, 8)">
    <!-- Main body - flowing curved shape -->
    <path d="
      M 32,42
      C 28,38 22,28 20,22
      C 18,16 22,10 26,14
      C 30,18 34,28 36,34
      L 42,30
      C 44,22 48,12 50,8
      C 52,4 56,2 56,8
      C 56,14 52,24 48,32
      L 56,28
      C 64,24 72,24 78,30
      C 84,36 86,44 84,52
      C 88,48 94,44 100,46
      C 106,48 108,54 104,58
      C 100,62 92,60 86,56
      C 84,62 78,68 70,70
      C 64,72 56,70 50,66
      C 44,62 38,56 34,50
      C 32,48 32,44 32,42
      Z
    " fill="#2D6A6A" />

    <!-- Tail - sweeping upward curve -->
    <path d="
      M 84,52
      C 88,46 94,38 100,34
      C 106,30 112,30 114,34
      C 116,38 112,44 106,48
      C 100,52 92,54 86,54
    " fill="#E8F0EE" />

    <!-- Snout tip / nose -->
    <path d="
      M 32,42
      C 28,40 22,42 20,44
      C 18,46 20,48 24,48
      C 28,48 32,46 34,44
      Z
    " fill="#1A3C3C" />

    <!-- Eye -->
    <circle cx="46" cy="36" r="2.5" fill="#1A3C3C" />

    <!-- Chest accent -->
    <path d="
      M 50,50
      C 46,46 44,40 46,36
      C 48,38 52,42 54,48
      C 52,50 50,50 50,50
      Z
    " fill="#E8F0EE" opacity="0.7" />

    <!-- Front leg sweep -->
    <path d="
      M 50,66
      C 46,70 40,78 36,82
      C 34,84 32,84 32,82
      C 32,80 36,74 42,68
    " fill="#1A3C3C" opacity="0.8" />

    <!-- Back leg sweep -->
    <path d="
      M 70,70
      C 74,74 80,80 84,84
      C 86,86 86,88 84,88
      C 82,88 76,82 72,76
    " fill="#1A3C3C" opacity="0.8" />
  </g>

  <!-- Wordmark -->
  <text x="135" y="68" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="42" font-weight="600" fill="#2D3748" letter-spacing="-0.5">
    Agent<tspan fill="#2D6A6A" font-weight="600">Foxx</tspan>
  </text>

  <!-- Subtle tagline -->
  <text x="137" y="90" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="11.5" font-weight="400" fill="#8896A6" letter-spacing="2.5">
    CONFERENCE NETWORKING AI
  </text>
</svg>